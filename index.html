<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
  <h1>Expense &amp; Budget Visualizer</h1>
  <div id="balance-display">Total: $0.00</div>
  <button id="theme-toggle">🌙</button>
</header>

    <main>
      <section id="form-section">
        <form id="input-form">
          <label for="name">Name</label>
          <input id="name" type="text" />
          <span id="error-name" class="error"></span>

          <label for="amount">Amount</label>
          <input id="amount" type="number" min="0.01" step="0.01" />
          <span id="error-amount" class="error"></span>

          <label for="category">Category</label>
          <select id="category">
            <option value="">-- Select --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span id="error-category" class="error"></span>

          <button type="submit">Add</button>
        </form>
      </section>

      <section id="chart-section">
        <canvas id="pie-chart"></canvas>
      </section>

      <section id="list-section">
  <div id="sort-controls">
    <label>Sort By:</label>
    <select id="sort-by">
      <option value="none">Sequence From The Beginning</option>
      <option value="amount">Amount</option>
      <option value="category">Category</option>
    </select>
  </div>

  <div id="transaction-list"></div>
</section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
